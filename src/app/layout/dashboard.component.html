<div class="app-shell" [class.nav-closed]="!sidenavOpen()">
  <button
    *ngIf="sidenavOpen()"
    type="button"
    class="mobile-backdrop"
    aria-label="Cerrar menu"
    (click)="closeMenu()"
  ></button>

  <aside class="sidebar">
    <div class="brand">
      <div class="brand-badge">AR</div>
      <div class="brand-text">
        <h1>AppReg</h1>
        <p>Operacion diaria</p>
      </div>
      <button type="button" class="mobile-close" (click)="closeMenu()" aria-label="Ocultar panel">Ocultar panel</button>
    </div>

    <nav class="menu">
      <a
        *ngFor="let item of navItems"
        [routerLink]="item.route"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: !!item.exact }"
        (click)="closeForMobile()"
      >
        <span class="menu-icon" aria-hidden="true">
          <ng-container [ngSwitch]="item.icon">
            <svg *ngSwitchCase="'home'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 10.5L12 3l9 7.5"></path>
              <path d="M5.25 9.75V21h13.5V9.75"></path>
            </svg>
            <svg *ngSwitchCase="'receipt'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M6 2l2 2 2-2 2 2 2-2 2 2 2-2v18l-2-2-2 2-2-2-2 2-2-2-2 2V2z"></path>
              <path d="M9 8h6M9 12h6M9 16h4"></path>
            </svg>
            <svg *ngSwitchCase="'arrow-up-circle'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="9"></circle>
              <path d="M12 16V8m0 0l-3 3m3-3l3 3"></path>
            </svg>
            <svg *ngSwitchCase="'arrow-down-circle'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="9"></circle>
              <path d="M12 8v8m0 0l-3-3m3 3l3-3"></path>
            </svg>
            <svg *ngSwitchCase="'wallet'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="6" width="18" height="12" rx="2"></rect>
              <path d="M16 12h4"></path>
              <circle cx="16" cy="12" r="1" fill="currentColor"></circle>
            </svg>
            <svg *ngSwitchCase="'shield-check'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 3l7 3v6c0 4.5-2.7 7.5-7 9-4.3-1.5-7-4.5-7-9V6l7-3z"></path>
              <path d="M9 12l2 2 4-4"></path>
            </svg>
            <svg *ngSwitchCase="'activity'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 12h4l2.5-6 4 12 2.5-6H21"></path>
            </svg>
            <svg *ngSwitchCase="'list'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M8 6h13"></path>
              <path d="M8 12h13"></path>
              <path d="M8 18h13"></path>
              <path d="M3 6h.01"></path>
              <path d="M3 12h.01"></path>
              <path d="M3 18h.01"></path>
            </svg>
            <svg *ngSwitchCase="'landmark'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 22h18"></path>
              <path d="M6 18h12"></path>
              <path d="M4 10l8-4 8 4"></path>
              <path d="M5 10v8"></path>
              <path d="M9 10v8"></path>
              <path d="M15 10v8"></path>
              <path d="M19 10v8"></path>
            </svg>
            <svg *ngSwitchDefault viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M10.3 3.4h3.4l.5 2.1c.4.1.8.3 1.2.5l1.9-1.1 2.4 2.4-1.1 1.9c.2.4.4.8.5 1.2l2.1.5v3.4l-2.1.5c-.1.4-.3.8-.5 1.2l1.1 1.9-2.4 2.4-1.9-1.1c-.4.2-.8.4-1.2.5l-.5 2.1h-3.4l-.5-2.1c-.4-.1-.8-.3-1.2-.5l-1.9 1.1-2.4-2.4 1.1-1.9c-.2-.4-.4-.8-.5-1.2l-2.1-.5v-3.4l2.1-.5c.1-.4.3-.8.5-1.2L4 7.3 6.4 4.9l1.9 1.1c.4-.2.8-.4 1.2-.5l.8-2.1z"></path>
              <circle cx="12" cy="12" r="3"></circle>
            </svg>
          </ng-container>
        </span>
        <span class="menu-label">{{ item.label }}</span>
      </a>
    </nav>

    <div class="sidebar-copy">JLGazano {{ today | date:'yyyy' }}</div>
  </aside>

  <section class="content-area">
    <header class="topbar">
      <button class="menu-toggle" type="button" (click)="toggle()" aria-label="Abrir o cerrar menu">Menu</button>
      <div class="topbar-title">
        <h2>Panel de gestion</h2>
        <p>{{ today | date:'fullDate' }}</p>
      </div>
      <div class="user-chip">Administrador</div>
    </header>

    <main class="content-wrapper">
      <router-outlet></router-outlet>
    </main>
  </section>
</div>
